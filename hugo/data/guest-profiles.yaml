Aaron Higashi:
  shortRole: Public Bible scholar
  dek: Scholar and teacher working at the intersection of biblical interpretation, contextual theology, and public-facing biblical education.
  bio: Aaron Higashi is a public Bible scholar and author whose work helps general audiences engage the Bible with greater historical awareness and interpretive responsibility. Across his appearances on Data Over Dogma, he discusses contextual theology, biblical interpretation, ethnicity in the Bible, and the challenges of reading familiar stories with adult eyes.
