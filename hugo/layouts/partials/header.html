<nav class="navbar container container--wide" aria-label="Primary navigation">
  <a class="navbar__logo" href="/">
    <span class="navbar__logo-mark">Metadata over Dogma</span>
    <span class="navbar__logo-subtitle">Unofficial companion guide</span>
  </a>

  <ul class="navbar__nav">
    {{ range .Site.Menus.main }}
      <li{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>
        <a href="{{ .URL }}" class="navbar__link"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
      </li>
    {{ end }}
  </ul>

  <div class="navbar__tools" aria-label="Archive utilities">
    <pagefind-modal-trigger>
      <button class="navbar__search-trigger" type="button" aria-label="Search transcripts">
        Search
      </button>
    </pagefind-modal-trigger>
    <a class="button-brutalist navbar__cta" href="/episodes/"
      >Browse episodes</a
    >
  </div>
</nav>
