<nav class="taxonomy-nav" aria-label="{{ .ariaLabel }}">
  {{- with .previousHref -}}
    <a class="button-brutalist taxonomy-nav__link" href="{{ . }}"
      >{{ $.previousLabel }}</a
    >
  {{- end -}}
  <a class="button-brutalist taxonomy-nav__link" href="{{ .allHref }}"
    >{{ .allLabel }}</a
  >
  {{- with .nextHref -}}
    <a class="button-brutalist taxonomy-nav__link" href="{{ . }}"
      >{{ $.nextLabel }}</a
    >
  {{- end -}}
</nav>
