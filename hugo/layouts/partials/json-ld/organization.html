{{- $publisher := dict "@type" "Organization" "name" .Site.Title -}}
{{- $schema := dict
  "@context" "https://schema.org"
  "@type" "WebSite"
  "name" .Site.Title
  "url" .Site.BaseURL
  "description" .Site.Params.description
  "publisher" $publisher
-}}
<script type="application/ld+json">
{{ $schema | jsonify (dict "indent" "  ") | safeJS }}
</script>
