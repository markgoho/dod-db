{{ define "main" }}
  <section class="cloud-page">
    <header class="page-hero">
      <div class="page-hero__eyebrow panel panel--accent">
        <span class="type-eyebrow">Topic index</span>
      </div>
      <h1 class="page-hero__title">Topics</h1>
      <p class="page-hero__description panel panel--muted">
        {{ len .Data.Terms }} topics across all episodes
      </p>
    </header>

    <ul class="token-cloud" role="list">
      {{ range .Data.Terms.Alphabetical }}
        <li>
          <a href="{{ .Page.RelPermalink }}" class="token-pill">
            <span class="token-pill__name">{{ .Page.Title }}</span>
            <span class="token-pill__count">{{ .Count }}</span>
          </a>
        </li>
      {{ end }}
    </ul>
  </section>
{{ end }}
