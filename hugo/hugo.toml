baseURL = 'https://dod-db.web.app/'
languageCode = 'en-us'
title = 'Data Over Dogma Podcast'
enableGitInfo = true

[params]
  description = "Increasing public access to the academic study of the Bible and religion and combating the spread of misinformation"

[frontmatter]
  lastmod = [':git', 'lastmod', ':fileModTime', 'date', 'publishDate']

[build]
  [build.buildStats]
    enable = false

[module]
  [module.hugoVersion]
    extended = true
    min = "0.129.0"

[taxonomies]
  tag = "tags"

# Disable RSS entirely
[outputs]
  home = ["html"]
  section = ["html"]
  taxonomy = ["html"]
  term = ["html"]

[permalinks]
  episodes = "/episodes/:contentbasename/"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow HTML in markdown (needed for timestamp links)



