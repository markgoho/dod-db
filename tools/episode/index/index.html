<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Episode - Data Over Dogma Tools</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="section">
        <nav class="breadcrumbs" id="breadcrumbs">
          <a href="/">Episodes</a>
          <span class="separator">&gt;</span>
          <span class="current" id="breadcrumb-title">Loading...</span>
        </nav>

        <div class="episode-hero" id="episode-hero">
          <div class="loading">Loading episode...</div>
        </div>
      </div>

      <div class="section">
        <h2>Episode Tools</h2>
        <p class="subtitle" style="margin-bottom: 0;">View and manage this episode's content</p>

        <div class="tools-grid" id="tools-grid">
          <!-- Tools will be rendered here -->
        </div>
      </div>

      <div class="section" id="audio-section" style="display: none;">
        <h2>Audio</h2>
        <div class="audio-player" id="audio-container">
          <!-- Audio player will be rendered here -->
        </div>
      </div>
    </div>

    <script src="./main.ts" type="module"></script>
  </body>
</html>
