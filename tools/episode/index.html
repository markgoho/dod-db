<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Episode - Data Over Dogma Tools</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <style>
      /* Page-specific styles */
      .episode-hero {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .episode-hero h1 {
        font-size: 28px;
        line-height: 1.3;
      }

      .episode-badge {
        display: inline-block;
        padding: 6px 16px;
        background: var(--color-gradient);
        color: white;
        border-radius: var(--radius-full);
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .episode-date {
        font-size: 16px;
        color: var(--color-gray-500);
      }

      .tools-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-top: 24px;
      }

      .tool-nav-card {
        background: white;
        border: 2px solid var(--color-gray-200);
        border-radius: var(--radius-lg);
        padding: 24px;
        text-decoration: none;
        color: inherit;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: block;
      }

      .tool-nav-card:hover {
        border-color: var(--color-primary);
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        text-decoration: none;
      }

      .tool-nav-icon {
        font-size: 36px;
        margin-bottom: 12px;
        display: block;
      }

      .tool-nav-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--color-gray-800);
        margin-bottom: 8px;
      }

      .tool-nav-description {
        font-size: 14px;
        color: var(--color-gray-500);
        line-height: 1.5;
      }

      .tool-nav-stat {
        margin-top: 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--color-primary);
      }

      .audio-section {
        margin-top: 24px;
        padding: 20px;
        background: var(--color-gray-50);
        border-radius: var(--radius-md);
        border: 1px solid var(--color-gray-200);
      }

      .audio-section h3 {
        font-size: 16px;
        margin-bottom: 12px;
        color: var(--color-gray-700);
      }

      .audio-section audio {
        width: 100%;
      }

      .no-audio {
        color: var(--color-gray-500);
        font-size: 14px;
        font-style: italic;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--color-gray-500);
        text-decoration: none;
        margin-bottom: 16px;
        transition: color 0.2s;
      }

      .back-link:hover {
        color: var(--color-primary);
        text-decoration: none;
      }

      .quick-info {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--color-gray-200);
      }

      .quick-info-item {
        text-align: center;
      }

      .quick-info-value {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-primary);
      }

      .quick-info-label {
        font-size: 12px;
        color: var(--color-gray-500);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="section">
        <nav class="breadcrumbs" id="breadcrumbs">
          <a href="/">Episodes</a>
          <span class="separator">&gt;</span>
          <span class="current" id="breadcrumb-title">Loading...</span>
        </nav>

        <div class="episode-hero" id="episode-hero">
          <div class="loading">Loading episode...</div>
        </div>
      </div>

      <div class="section">
        <h2>Episode Tools</h2>
        <p class="subtitle" style="margin-bottom: 0;">View and manage this episode's content</p>

        <div class="tools-grid" id="tools-grid">
          <!-- Tools will be rendered here -->
        </div>
      </div>

      <div class="section" id="audio-section" style="display: none;">
        <h2>Audio</h2>
        <div class="audio-player" id="audio-container">
          <!-- Audio player will be rendered here -->
        </div>
      </div>
    </div>

    <script type="module">
      import { DoDTools } from '/shared/utilities.js';

      const videoId = DoDTools.getVideoIdFromUrl();

      async function init() {
        if (!videoId) {
          document.getElementById('episode-hero').innerHTML =
            '<div class="empty-state"><div class="empty-state-text">Invalid episode URL</div></div>';
          return;
        }

        try {
          const episode = await DoDTools.getEpisode(videoId);

          if (!episode) {
            document.getElementById('episode-hero').innerHTML =
              '<div class="empty-state"><div class="empty-state-text">Episode not found</div></div>';
            return;
          }

          renderEpisode(episode);
          renderTools(episode);

          if (episode.hasAudio) {
            renderAudio();
          }

          // Update page title
          document.title = `Episode ${episode.episodeNumber || '?'} - DoD Tools`;
        } catch (error) {
          console.error('Failed to load episode:', error);
          document.getElementById('episode-hero').innerHTML =
            '<div class="empty-state"><div class="empty-state-text">Failed to load episode</div></div>';
        }
      }

      function renderEpisode(episode) {
        const heroEl = document.getElementById('episode-hero');
        const breadcrumbTitle = document.getElementById('breadcrumb-title');

        breadcrumbTitle.textContent = `Episode ${episode.episodeNumber || '?'}`;

        const tagCount = episode.tags?.length || 0;
        const segmentCount = episode.segments?.length || 0;
        const totalMentions = episode.tags?.reduce((sum, t) => sum + t.mentions, 0) || 0;

        heroEl.innerHTML = `
          <div>
            <span class="episode-badge">Episode ${episode.episodeNumber || '?'}</span>
            <h1>${DoDTools.escapeHtml(episode.title)}</h1>
            <div class="episode-date">${DoDTools.formatDate(episode.publishedAt)}</div>
          </div>
          <div class="quick-info">
            <div class="quick-info-item">
              <div class="quick-info-value">${tagCount}</div>
              <div class="quick-info-label">Tags</div>
            </div>
            <div class="quick-info-item">
              <div class="quick-info-value">${totalMentions}</div>
              <div class="quick-info-label">Tag Mentions</div>
            </div>
            <div class="quick-info-item">
              <div class="quick-info-value">${segmentCount}</div>
              <div class="quick-info-label">Segments</div>
            </div>
          </div>
        `;
      }

      function renderTools(episode) {
        const toolsGrid = document.getElementById('tools-grid');
        const tagCount = episode.tags?.length || 0;
        const segmentCount = episode.segments?.length || 0;

        toolsGrid.innerHTML = `
          <a href="/episode/${videoId}/transcript" class="tool-nav-card">
            <span class="tool-nav-icon">Transcript</span>
            <div class="tool-nav-title">Transcript</div>
            <div class="tool-nav-description">
              View the full transcript with timestamps. Click any line to jump to that moment in the audio.
            </div>
          </a>

          <a href="/episode/${videoId}/segments" class="tool-nav-card">
            <span class="tool-nav-icon">Segments</span>
            <div class="tool-nav-title">Segments</div>
            <div class="tool-nav-description">
              View and edit segment boundaries. Verify timestamps and segment types.
            </div>
            <div class="tool-nav-stat">${segmentCount} segments detected</div>
          </a>

          <a href="/episode/${videoId}/tags" class="tool-nav-card">
            <span class="tool-nav-icon">Tags</span>
            <div class="tool-nav-title">Tags</div>
            <div class="tool-nav-description">
              Browse all tags extracted from this episode, organized by category.
            </div>
            <div class="tool-nav-stat">${tagCount} tags found</div>
          </a>

          <a href="/episode/${videoId}/corrections" class="tool-nav-card">
            <span class="tool-nav-icon">Corrections</span>
            <div class="tool-nav-title">Corrections</div>
            <div class="tool-nav-description">
              Review correction candidates specific to this episode.
            </div>
          </a>
        `;
      }

      function renderAudio() {
        const audioSection = document.getElementById('audio-section');
        audioSection.style.display = 'block';

        DoDTools.createAudioPlayer('audio-container', videoId);
      }

      init();
    </script>
  </body>
</html>
