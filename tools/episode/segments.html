<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segments - Episode - Data Over Dogma Tools</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <style>
      /* Page-specific styles */
      .segments-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
      }

      @media (min-width: 1200px) {
        .segments-layout {
          grid-template-columns: 1fr 400px;
        }
      }

      .main-panel {
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
      }

      .panel-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--color-gray-200);
      }

      .panel-header h2 {
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 20px;
      }

      .timeline-section {
        padding: 24px;
        border-bottom: 1px solid var(--color-gray-200);
      }

      .timeline-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--color-gray-500);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
      }

      .timeline {
        position: relative;
        height: 60px;
        background: var(--color-gray-100);
        border-radius: var(--radius-md);
        overflow: hidden;
      }

      .timeline-segment {
        position: absolute;
        top: 4px;
        bottom: 4px;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 600;
        color: white;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        white-space: nowrap;
        transition: opacity 0.2s;
      }

      .timeline-segment:hover {
        opacity: 0.85;
      }

      .timeline-segment.active {
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.3);
      }

      .audio-section {
        padding: 24px;
        background: var(--color-gray-50);
        border-bottom: 1px solid var(--color-gray-200);
      }

      .audio-section audio {
        width: 100%;
        margin-bottom: 12px;
      }

      .audio-time-row {
        display: flex;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 14px;
        color: var(--color-gray-600);
      }

      .segments-list {
        padding: 24px;
      }

      .segment-row {
        display: grid;
        grid-template-columns: 180px 90px 90px auto 80px 40px;
        gap: 12px;
        align-items: center;
        padding: 12px;
        border: 1px solid var(--color-gray-200);
        border-radius: var(--radius-md);
        margin-bottom: 8px;
        transition: all 0.2s;
      }

      .segment-row:hover {
        background: var(--color-gray-50);
      }

      .segment-row.active {
        border-color: var(--color-primary);
        background: rgba(102, 126, 234, 0.05);
      }

      .segment-row select,
      .segment-row input {
        padding: 8px 10px;
        border: 1px solid var(--color-gray-200);
        border-radius: var(--radius-sm);
        font-size: 13px;
        font-family: inherit;
      }

      .segment-row select:focus,
      .segment-row input:focus {
        outline: none;
        border-color: var(--color-primary);
      }

      .segment-row input {
        font-family: var(--font-mono);
        text-align: center;
      }

      .segment-confidence {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: var(--radius-full);
        font-weight: 600;
        text-transform: uppercase;
      }

      .segment-confidence.auto {
        background: var(--color-warning-light);
        color: var(--color-warning-dark);
      }

      .segment-confidence.verified {
        background: var(--color-success-light);
        color: var(--color-success-dark);
      }

      .segment-actions {
        display: flex;
        gap: 4px;
      }

      .btn-icon {
        padding: 6px 10px;
        border: 1px solid var(--color-gray-200);
        border-radius: var(--radius-sm);
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
      }

      .btn-icon:hover {
        background: var(--color-gray-50);
        border-color: var(--color-gray-300);
      }

      .btn-icon.danger:hover {
        background: var(--color-error-light);
        border-color: var(--color-error);
        color: var(--color-error);
      }

      .actions-bar {
        padding: 16px 24px;
        border-top: 1px solid var(--color-gray-200);
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .sidebar-panel {
        position: sticky;
        top: 20px;
      }

      .transcript-panel {
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
      }

      .transcript-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--color-gray-200);
        font-weight: 700;
      }

      .transcript-content {
        flex: 1;
        overflow-y: auto;
        padding: 0;
      }

      .transcript-line {
        padding: 8px 16px;
        border-bottom: 1px solid var(--color-gray-100);
        cursor: pointer;
        transition: background 0.2s;
        font-size: 13px;
      }

      .transcript-line:hover {
        background: var(--color-gray-50);
      }

      .transcript-line.active {
        background: rgba(102, 126, 234, 0.1);
        border-left: 3px solid var(--color-primary);
      }

      .transcript-line .timestamp {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--color-gray-500);
        margin-right: 8px;
      }

      .transcript-line .speaker {
        font-weight: 600;
        color: var(--color-primary);
        margin-right: 4px;
      }

      .transcript-line .text {
        color: var(--color-gray-700);
      }

      .empty-segments {
        text-align: center;
        padding: 40px;
        color: var(--color-gray-500);
      }
    </style>
  </head>
  <body>
    <div class="container-wide">
      <div class="section" style="background: transparent; box-shadow: none; padding: 0;">
        <nav class="breadcrumbs" id="breadcrumbs">
          <a href="/">Episodes</a>
          <span class="separator">&gt;</span>
          <a href="#" id="breadcrumb-episode">Episode</a>
          <span class="separator">&gt;</span>
          <span class="current">Segments</span>
        </nav>
      </div>

      <div class="segments-layout">
        <div class="main-panel">
          <div class="panel-header">
            <h2 id="panel-title">Segment Verification</h2>
          </div>

          <div class="timeline-section">
            <div class="timeline-label">Segment Timeline</div>
            <div class="timeline" id="timeline">
              <!-- Timeline segments rendered here -->
            </div>
          </div>

          <div class="audio-section" id="audio-section">
            <audio id="audio" controls>
              Your browser does not support the audio element.
            </audio>
            <div class="audio-time-row">
              <span id="current-time">00:00:00</span>
              <span id="total-time">--:--:--</span>
            </div>
          </div>

          <div class="segments-list" id="segments-list">
            <div class="loading">Loading segments...</div>
          </div>

          <div class="actions-bar">
            <button class="btn btn-secondary" onclick="addSegment()">+ Add Segment</button>
            <button class="btn btn-secondary" onclick="markAllVerified()">Mark All Verified</button>
            <button class="btn btn-primary" onclick="saveSegments()">Save Changes</button>
          </div>
        </div>

        <div class="sidebar-panel">
          <div class="transcript-panel">
            <div class="transcript-header">Transcript</div>
            <div class="transcript-content" id="transcript-content">
              <div class="loading" style="padding: 20px;">Loading transcript...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { DoDTools } from '/shared/utilities.js';

      const videoId = DoDTools.getVideoIdFromUrl();
      let episode = null;
      let segments = [];
      let metadata = { labels: {}, colors: {}, types: [] };
      let transcriptLines = [];
      let audioElement = null;
      let selectedSegmentIndex = -1;
      let hasUnsavedChanges = false;

      async function init() {
        if (!videoId) {
          document.getElementById('segments-list').innerHTML =
            '<div class="empty-segments">Invalid episode URL</div>';
          return;
        }

        try {
          // Load episode, metadata, and transcript in parallel
          const [episodeData, metadataRes, transcriptText] = await Promise.all([
            DoDTools.getEpisode(videoId),
            fetch('/api/segment-verification/segment-metadata').then(r => r.json()),
            DoDTools.getTranscript(videoId)
          ]);

          episode = episodeData;
          metadata = metadataRes;
          segments = [...(episode.segments || [])];

          if (!episode) {
            document.getElementById('segments-list').innerHTML =
              '<div class="empty-segments">Episode not found</div>';
            return;
          }

          // Update breadcrumb
          const breadcrumbEpisode = document.getElementById('breadcrumb-episode');
          breadcrumbEpisode.href = `/episode/${videoId}`;
          breadcrumbEpisode.textContent = `Episode ${episode.episodeNumber || '?'}`;

          document.getElementById('panel-title').textContent =
            `Episode ${episode.episodeNumber || '?'}: Segments`;
          document.title = `Segments - Episode ${episode.episodeNumber || '?'} - DoD Tools`;

          // Parse transcript
          if (transcriptText) {
            transcriptLines = DoDTools.parseTranscript(transcriptText);
            renderTranscript();
          }

          // Setup audio
          setupAudio();

          // Render segments
          renderTimeline();
          renderSegmentsList();

        } catch (error) {
          console.error('Failed to load segments:', error);
          document.getElementById('segments-list').innerHTML =
            '<div class="empty-segments">Failed to load segments</div>';
        }
      }

      function setupAudio() {
        audioElement = document.getElementById('audio');

        if (episode.hasAudio) {
          audioElement.src = `/api/audio/${videoId}`;
          audioElement.addEventListener('timeupdate', () => {
            document.getElementById('current-time').textContent =
              DoDTools.secondsToTimestamp(audioElement.currentTime);
            updateActiveTranscriptLine(audioElement.currentTime);
          });
          audioElement.addEventListener('loadedmetadata', () => {
            document.getElementById('total-time').textContent =
              DoDTools.secondsToTimestamp(audioElement.duration);
          });
        } else {
          document.getElementById('audio-section').innerHTML =
            '<div style="padding: 20px; text-align: center; color: var(--color-gray-500);">Audio not available</div>';
        }
      }

      function getTotalDuration() {
        return DoDTools.getTotalDuration(segments);
      }

      function renderTimeline() {
        const timeline = document.getElementById('timeline');
        const totalDuration = getTotalDuration();

        if (segments.length === 0) {
          timeline.innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--color-gray-500); font-size: 13px;">No segments</div>';
          return;
        }

        timeline.innerHTML = segments.map((seg, i) => {
          const start = DoDTools.timestampToSeconds(seg.startTimestamp);
          const end = seg.endTimestamp
            ? DoDTools.timestampToSeconds(seg.endTimestamp)
            : totalDuration;
          const left = (start / totalDuration) * 100;
          const width = Math.max(((end - start) / totalDuration) * 100, 2);
          const isActive = i === selectedSegmentIndex;
          const color = metadata.colors[seg.type] || '#666';
          const label = metadata.labels[seg.type] || seg.type;

          return `
            <div class="timeline-segment ${isActive ? 'active' : ''}"
                 style="left: ${left}%; width: ${width}%; background: ${color}"
                 onclick="selectSegment(${i})"
                 title="${label}">
              ${width > 8 ? label : ''}
            </div>
          `;
        }).join('');
      }

      function renderSegmentsList() {
        const container = document.getElementById('segments-list');

        if (segments.length === 0) {
          container.innerHTML = '<div class="empty-segments">No segments detected. Click "+ Add Segment" to create one.</div>';
          return;
        }

        container.innerHTML = segments.map((seg, i) => {
          const isActive = i === selectedSegmentIndex;

          return `
            <div class="segment-row ${isActive ? 'active' : ''}" data-index="${i}">
              <select onchange="updateSegmentType(${i}, this.value)">
                ${metadata.types.map(type => `
                  <option value="${type}" ${seg.type === type ? 'selected' : ''}>
                    ${metadata.labels[type] || type}
                  </option>
                `).join('')}
              </select>
              <input type="text"
                     value="${DoDTools.formatTimestamp(seg.startTimestamp)}"
                     onchange="updateSegmentStart(${i}, this.value)"
                     placeholder="Start">
              <input type="text"
                     value="${seg.endTimestamp ? DoDTools.formatTimestamp(seg.endTimestamp) : ''}"
                     onchange="updateSegmentEnd(${i}, this.value)"
                     placeholder="End">
              <span class="segment-confidence ${seg.confidence}">${seg.confidence}</span>
              <div class="segment-actions">
                <button class="btn-icon" onclick="playSegment(${i})" title="Play">Play</button>
                <button class="btn-icon danger" onclick="deleteSegment(${i})" title="Delete">X</button>
              </div>
            </div>
          `;
        }).join('');
      }

      function renderTranscript() {
        const container = document.getElementById('transcript-content');

        container.innerHTML = transcriptLines.map((line, i) => `
          <div class="transcript-line" id="tline-${i}" onclick="jumpToTime(${line.seconds})">
            <span class="timestamp">[${DoDTools.formatTimestamp(line.timestamp)}]</span>
            <span class="speaker">${DoDTools.escapeHtml(line.speaker)}:</span>
            <span class="text">${DoDTools.escapeHtml(line.text)}</span>
          </div>
        `).join('');
      }

      function updateActiveTranscriptLine(currentTime) {
        // Remove previous active
        document.querySelectorAll('.transcript-line.active').forEach(el => el.classList.remove('active'));

        // Find current line
        for (let i = transcriptLines.length - 1; i >= 0; i--) {
          if (transcriptLines[i].seconds <= currentTime) {
            const el = document.getElementById(`tline-${i}`);
            if (el) {
              el.classList.add('active');
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            break;
          }
        }
      }

      window.selectSegment = function(index) {
        selectedSegmentIndex = index;
        const seg = segments[index];
        if (seg && audioElement) {
          audioElement.currentTime = DoDTools.timestampToSeconds(seg.startTimestamp);
          audioElement.play().catch(() => {});
        }
        renderTimeline();
        renderSegmentsList();
      };

      window.playSegment = function(index) {
        selectSegment(index);
      };

      window.jumpToTime = function(seconds) {
        if (audioElement) {
          audioElement.currentTime = seconds;
          audioElement.play().catch(() => {});
        }
      };

      window.updateSegmentType = function(index, type) {
        segments[index].type = type;
        segments[index].confidence = 'verified';
        segments[index].detectionMethod = 'manual';
        hasUnsavedChanges = true;
        renderTimeline();
      };

      window.updateSegmentStart = function(index, value) {
        const parsed = DoDTools.parseTimestamp(value);
        if (parsed) {
          segments[index].startTimestamp = parsed;
          segments[index].confidence = 'verified';
          segments[index].detectionMethod = 'manual';
          hasUnsavedChanges = true;
          renderTimeline();
        }
      };

      window.updateSegmentEnd = function(index, value) {
        if (!value) {
          segments[index].endTimestamp = null;
        } else {
          const parsed = DoDTools.parseTimestamp(value);
          if (parsed) {
            segments[index].endTimestamp = parsed;
          }
        }
        segments[index].confidence = 'verified';
        segments[index].detectionMethod = 'manual';
        hasUnsavedChanges = true;
        renderTimeline();
      };

      window.deleteSegment = function(index) {
        if (confirm('Delete this segment?')) {
          segments.splice(index, 1);
          selectedSegmentIndex = -1;
          hasUnsavedChanges = true;
          renderTimeline();
          renderSegmentsList();
        }
      };

      window.addSegment = function() {
        const currentTime = audioElement ? audioElement.currentTime : 0;
        const newSegment = {
          type: metadata.types[0] || 'main-content',
          startTimestamp: DoDTools.formatSecondsToTimestamp(currentTime),
          endTimestamp: null,
          confidence: 'auto',
          detectionMethod: 'manual'
        };
        segments.push(newSegment);
        segments.sort((a, b) =>
          DoDTools.timestampToSeconds(a.startTimestamp) - DoDTools.timestampToSeconds(b.startTimestamp)
        );
        hasUnsavedChanges = true;
        renderTimeline();
        renderSegmentsList();
        DoDTools.showToast('Segment added', 'success');
      };

      window.markAllVerified = function() {
        segments.forEach(seg => {
          seg.confidence = 'verified';
        });
        hasUnsavedChanges = true;
        renderSegmentsList();
        DoDTools.showToast('All segments marked as verified', 'success');
      };

      window.saveSegments = async function() {
        try {
          const response = await fetch(`/api/segment-verification/segments/${videoId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ segments })
          });

          if (response.ok) {
            hasUnsavedChanges = false;
            DoDTools.showToast('Segments saved successfully', 'success');
          } else {
            const data = await response.json();
            DoDTools.showToast(data.error || 'Failed to save', 'error');
          }
        } catch (error) {
          console.error('Save error:', error);
          DoDTools.showToast('Failed to save segments', 'error');
        }
      };

      // Warn before leaving with unsaved changes
      window.addEventListener('beforeunload', (e) => {
        if (hasUnsavedChanges) {
          e.preventDefault();
          e.returnValue = '';
        }
      });

      init();
    </script>
  </body>
</html>
