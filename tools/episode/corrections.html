<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corrections - Episode - Data Over Dogma Tools</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <style>
      /* Page-specific styles */
      .corrections-grid {
        display: grid;
        gap: 20px;
      }

      .correction-card {
        background: white;
        border: 1px solid var(--color-gray-200);
        border-radius: var(--radius-lg);
        padding: 24px;
        transition: all 0.2s;
      }

      .correction-card:hover {
        box-shadow: var(--shadow-md);
      }

      .correction-card.approved {
        opacity: 0.5;
        border-color: var(--color-success);
        background: var(--color-success-light);
      }

      .correction-card.rejected {
        opacity: 0.5;
        border-color: var(--color-error);
        background: var(--color-error-light);
      }

      .correction-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
        gap: 16px;
      }

      .correction-pair {
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: wrap;
      }

      .correction-original {
        font-size: 18px;
        font-weight: 600;
        color: var(--color-error);
        background: var(--color-error-light);
        padding: 6px 14px;
        border-radius: var(--radius-md);
        text-decoration: line-through;
      }

      .correction-arrow {
        color: var(--color-gray-400);
        font-size: 20px;
      }

      .correction-corrected {
        font-size: 18px;
        font-weight: 600;
        color: var(--color-success-dark);
        background: var(--color-success-light);
        padding: 6px 14px;
        border-radius: var(--radius-md);
      }

      .correction-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 16px;
      }

      .meta-badge {
        font-size: 12px;
        padding: 4px 10px;
        border-radius: var(--radius-full);
        background: var(--color-gray-100);
        color: var(--color-gray-600);
        font-weight: 500;
      }

      .meta-badge.confidence {
        background: var(--color-info-light);
        color: var(--color-info-dark);
      }

      .meta-badge.category {
        background: var(--color-warning-light);
        color: var(--color-warning-dark);
      }

      .correction-examples {
        margin-bottom: 16px;
      }

      .correction-examples h4 {
        font-size: 13px;
        font-weight: 600;
        color: var(--color-gray-600);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .example-item {
        padding: 10px 14px;
        background: var(--color-gray-50);
        border-radius: var(--radius-md);
        margin-bottom: 6px;
        font-size: 14px;
        color: var(--color-gray-700);
        line-height: 1.5;
        cursor: pointer;
        transition: background 0.2s;
      }

      .example-item:hover {
        background: var(--color-gray-100);
      }

      .example-item mark {
        background: #fde68a;
        padding: 0 2px;
        border-radius: 2px;
        font-weight: 600;
      }

      .example-timestamp {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--color-gray-500);
        margin-right: 8px;
      }

      .correction-actions {
        display: flex;
        gap: 12px;
        padding-top: 16px;
        border-top: 1px solid var(--color-gray-200);
      }

      .correction-actions .btn {
        flex: 1;
      }

      .no-corrections {
        text-align: center;
        padding: 60px 20px;
        color: var(--color-gray-500);
      }

      .no-corrections-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.5;
      }

      .no-corrections-text {
        font-size: 18px;
        margin-bottom: 8px;
      }

      .no-corrections-subtext {
        font-size: 14px;
      }

      .audio-player-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl);
        padding: 16px;
        width: 320px;
        z-index: 100;
        display: none;
      }

      .audio-player-float.show {
        display: block;
      }

      .audio-player-float audio {
        width: 100%;
      }

      .audio-player-float .close-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        color: var(--color-gray-500);
      }

      .audio-player-float .close-btn:hover {
        color: var(--color-gray-800);
      }

      .summary-bar {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        margin-bottom: 24px;
        padding: 16px 20px;
        background: var(--color-gray-50);
        border-radius: var(--radius-md);
      }

      .summary-item {
        text-align: center;
      }

      .summary-value {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-primary);
      }

      .summary-label {
        font-size: 12px;
        color: var(--color-gray-500);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .filter-bar {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .filter-btn {
        padding: 8px 16px;
        border: 2px solid var(--color-gray-200);
        border-radius: var(--radius-full);
        background: white;
        font-size: 13px;
        font-weight: 600;
        color: var(--color-gray-600);
        cursor: pointer;
        transition: all 0.2s;
      }

      .filter-btn:hover {
        border-color: var(--color-primary);
        color: var(--color-primary);
      }

      .filter-btn.active {
        background: var(--color-gradient);
        border-color: transparent;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="section">
        <nav class="breadcrumbs" id="breadcrumbs">
          <a href="/">Episodes</a>
          <span class="separator">&gt;</span>
          <a href="#" id="breadcrumb-episode">Episode</a>
          <span class="separator">&gt;</span>
          <span class="current">Corrections</span>
        </nav>

        <h1 id="page-title">Episode Corrections</h1>
        <p class="subtitle">Review correction candidates for this episode</p>

        <div class="summary-bar" id="summary-bar">
          <div class="summary-item">
            <div class="summary-value" id="total-count">-</div>
            <div class="summary-label">Candidates</div>
          </div>
          <div class="summary-item">
            <div class="summary-value" id="pending-count">-</div>
            <div class="summary-label">Pending</div>
          </div>
          <div class="summary-item">
            <div class="summary-value" id="approved-count">-</div>
            <div class="summary-label">Approved</div>
          </div>
        </div>

        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('all')">All</button>
          <button class="filter-btn" onclick="setFilter('pending')">Pending</button>
          <button class="filter-btn" onclick="setFilter('approved')">Approved</button>
          <button class="filter-btn" onclick="setFilter('rejected')">Rejected</button>
        </div>

        <div class="corrections-grid" id="corrections-container">
          <div class="loading">Loading corrections...</div>
        </div>
      </div>
    </div>

    <!-- Floating audio player -->
    <div class="audio-player-float" id="audio-player">
      <button class="close-btn" onclick="hideAudioPlayer()">x</button>
      <audio id="audio" controls></audio>
    </div>

    <script type="module">
      import { DoDTools } from '/shared/utilities.js';

      const videoId = DoDTools.getVideoIdFromUrl();
      let episode = null;
      let corrections = [];
      let currentFilter = 'all';
      let audioElement = null;

      async function init() {
        if (!videoId) {
          document.getElementById('corrections-container').innerHTML =
            '<div class="no-corrections"><div class="no-corrections-text">Invalid episode URL</div></div>';
          return;
        }

        try {
          // Load episode and corrections in parallel
          const [episodeData, correctionsData] = await Promise.all([
            DoDTools.getEpisode(videoId),
            fetch(`/api/episode/${videoId}/corrections`).then(r => r.json())
          ]);

          episode = episodeData;
          corrections = correctionsData;

          if (!episode) {
            document.getElementById('corrections-container').innerHTML =
              '<div class="no-corrections"><div class="no-corrections-text">Episode not found</div></div>';
            return;
          }

          // Update breadcrumb
          const breadcrumbEpisode = document.getElementById('breadcrumb-episode');
          breadcrumbEpisode.href = `/episode/${videoId}`;
          breadcrumbEpisode.textContent = `Episode ${episode.episodeNumber || '?'}`;

          document.getElementById('page-title').textContent =
            `Episode ${episode.episodeNumber || '?'}: Corrections`;
          document.title = `Corrections - Episode ${episode.episodeNumber || '?'} - DoD Tools`;

          // Setup audio
          audioElement = document.getElementById('audio');
          if (episode.hasAudio) {
            audioElement.src = `/api/audio/${videoId}`;
          }

          updateSummary();
          renderCorrections();

        } catch (error) {
          console.error('Failed to load corrections:', error);
          document.getElementById('corrections-container').innerHTML =
            '<div class="no-corrections"><div class="no-corrections-text">Failed to load corrections</div></div>';
        }
      }

      function updateSummary() {
        const total = corrections.length;
        const pending = corrections.filter(c => c.status === 'pending').length;
        const approved = corrections.filter(c => c.status === 'approved').length;

        document.getElementById('total-count').textContent = total;
        document.getElementById('pending-count').textContent = pending;
        document.getElementById('approved-count').textContent = approved;
      }

      window.setFilter = function(filter) {
        currentFilter = filter;

        // Update button states
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        renderCorrections();
      };

      function getFilteredCorrections() {
        if (currentFilter === 'all') return corrections;
        return corrections.filter(c => c.status === currentFilter);
      }

      function renderCorrections() {
        const container = document.getElementById('corrections-container');
        const filtered = getFilteredCorrections();

        if (filtered.length === 0) {
          container.innerHTML = `
            <div class="no-corrections">
              <div class="no-corrections-icon">Check</div>
              <div class="no-corrections-text">No corrections found</div>
              <div class="no-corrections-subtext">
                ${corrections.length > 0
                  ? 'Try a different filter'
                  : 'No correction candidates have been identified for this episode'}
              </div>
            </div>
          `;
          return;
        }

        // Sort by confidence
        const sorted = [...filtered].sort((a, b) => (b.confidence || 0) - (a.confidence || 0));

        container.innerHTML = sorted.map(correction => {
          const status = correction.status || 'pending';
          const examples = correction.examples?.slice(0, 3) || [];

          return `
            <div class="correction-card ${status}" data-key="${correction.key}">
              <div class="correction-header">
                <div class="correction-pair">
                  <span class="correction-original">${DoDTools.escapeHtml(correction.original)}</span>
                  <span class="correction-arrow">&rarr;</span>
                  <span class="correction-corrected">${DoDTools.escapeHtml(correction.corrected)}</span>
                </div>
              </div>

              <div class="correction-meta">
                <span class="meta-badge confidence">${correction.confidence || 0}% confidence</span>
                <span class="meta-badge category">${correction.category || 'unknown'}</span>
                <span class="meta-badge">${correction.totalOccurrences || 0} occurrences</span>
              </div>

              ${examples.length > 0 ? `
                <div class="correction-examples">
                  <h4>Examples in Context</h4>
                  ${examples.map((ex, i) => {
                    const timestamp = correction.timestamps?.[i];
                    const highlighted = ex.replace(
                      new RegExp(correction.original, 'gi'),
                      '<mark>$&</mark>'
                    );
                    return `
                      <div class="example-item" ${timestamp ? `onclick="playAt('${timestamp}')"` : ''}>
                        ${timestamp ? `<span class="example-timestamp">[${timestamp}]</span>` : ''}
                        ${highlighted}
                      </div>
                    `;
                  }).join('')}
                </div>
              ` : ''}

              <div class="correction-actions">
                ${status === 'pending' ? `
                  <button class="btn btn-success" onclick="approveCorrection('${correction.key}')">
                    Approve
                  </button>
                  <button class="btn btn-danger" onclick="rejectCorrection('${correction.key}')">
                    Reject
                  </button>
                ` : `
                  <span style="flex: 1; text-align: center; color: var(--color-gray-500);">
                    ${status === 'approved' ? 'Approved' : 'Rejected'}
                  </span>
                `}
              </div>
            </div>
          `;
        }).join('');
      }

      window.playAt = function(timestamp) {
        if (!episode.hasAudio) {
          DoDTools.showToast('Audio not available', 'warning');
          return;
        }

        const player = document.getElementById('audio-player');
        player.classList.add('show');

        const seconds = DoDTools.timestampToSeconds(`[${timestamp}]`);
        audioElement.currentTime = seconds;
        audioElement.play().catch(() => {});
      };

      window.hideAudioPlayer = function() {
        const player = document.getElementById('audio-player');
        player.classList.remove('show');
        audioElement.pause();
      };

      window.approveCorrection = async function(key) {
        try {
          const response = await fetch(`/api/review-corrections/approve/${encodeURIComponent(key)}`, {
            method: 'POST'
          });

          if (response.ok) {
            // Update local state
            const correction = corrections.find(c => c.key === key);
            if (correction) {
              correction.status = 'approved';
            }
            updateSummary();
            renderCorrections();
            DoDTools.showToast('Correction approved and added to rules', 'success');
          } else {
            const data = await response.json();
            DoDTools.showToast(data.error || 'Failed to approve', 'error');
          }
        } catch (error) {
          console.error('Approve error:', error);
          DoDTools.showToast('Failed to approve correction', 'error');
        }
      };

      window.rejectCorrection = async function(key) {
        try {
          const response = await fetch(`/api/review-corrections/reject/${encodeURIComponent(key)}`, {
            method: 'POST'
          });

          if (response.ok) {
            // Update local state
            const correction = corrections.find(c => c.key === key);
            if (correction) {
              correction.status = 'rejected';
            }
            updateSummary();
            renderCorrections();
            DoDTools.showToast('Correction rejected', 'success');
          } else {
            const data = await response.json();
            DoDTools.showToast(data.error || 'Failed to reject', 'error');
          }
        } catch (error) {
          console.error('Reject error:', error);
          DoDTools.showToast('Failed to reject correction', 'error');
        }
      };

      init();
    </script>
  </body>
</html>
