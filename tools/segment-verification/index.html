<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segment Verification - Data Over Dogma</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Segment Verification</h1>
        <div class="stats">
          <div class="stat">
            <span class="stat-value" id="total-episodes">-</span>
            <div class="stat-label">Episodes</div>
          </div>
          <div class="stat">
            <span class="stat-value" id="total-segments">-</span>
            <div class="stat-label">Segments</div>
          </div>
          <div class="stat">
            <span class="stat-value" id="verified-count">-</span>
            <div class="stat-label">Verified</div>
          </div>
        </div>
      </header>

      <div class="main-layout">
        <div class="sidebar">
          <h2>Episodes</h2>
          <div class="filter-bar">
            <select id="status-filter">
              <option value="all">All Status</option>
              <option value="needs-review" selected>Needs Review</option>
              <option value="verified">Verified</option>
            </select>
          </div>
          <div class="episode-list" id="episode-list">
            <!-- Episodes loaded here -->
          </div>
        </div>

        <div class="content" id="content">
          <div class="no-selection">
            <p>Select an episode to view and edit segments</p>
          </div>
        </div>

        <div class="transcript-panel" id="transcript-panel">
          <h3>Transcript</h3>
          <label>
            View
            <select id="transcript-granularity" onchange="loadTranscript()">
              <option value="speaker">Speaker grouped</option>
              <option value="sentence">Sentence split</option>
            </select>
          </label>
          <div class="transcript-lines-wrapper" id="transcript-lines">
            <p style="color: #666; text-align: center; padding: 40px">
              Select an episode to view transcript
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="./main.ts" type="module"></script>
  </body>
</html>
