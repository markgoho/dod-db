<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Episodes - Data Over Dogma Tools</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <div class="header-main">
            <h1>DoD Episodes</h1>
            <p class="subtitle">
              Browse and manage all Data Over Dogma episodes
            </p>
          </div>
          <div class="quick-tools">
            <a href="/validate-timestamps" class="quick-tool">
              <span>Timestamp Validator</span>
            </a>
            <a href="/review-corrections" class="quick-tool">
              <span>Corrections</span>
            </a>
            <a href="/tag-vocabulary" class="quick-tool">
              <span>Tag Vocabulary</span>
            </a>
            <a href="/segment-verification" class="quick-tool">
              <span>Segments</span>
            </a>
            <a href="/jingle-extractor" class="quick-tool">
              <span>Jingle Extractor</span>
            </a>
          </div>
        </div>
        <div class="stats" id="stats">
          <div class="stat">
            <span class="stat-value" id="total-episodes">-</span>
            <div class="stat-label">Episodes</div>
          </div>
          <div class="stat">
            <span class="stat-value" id="total-tags">-</span>
            <div class="stat-label">Total Tags</div>
          </div>
          <div class="stat">
            <span class="stat-value" id="total-segments">-</span>
            <div class="stat-label">Segments</div>
          </div>
        </div>
      </header>

      <div class="section">
        <div class="controls">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search episodes by title..."
          />
          <select id="sort-select" class="sort-select">
            <option value="episode-desc">Episode # (newest)</option>
            <option value="episode-asc">Episode # (oldest)</option>
            <option value="date-desc">Date (newest)</option>
            <option value="date-asc">Date (oldest)</option>
            <option value="tags-desc">Tag count (high)</option>
            <option value="tags-asc">Tag count (low)</option>
          </select>
        </div>

        <div class="episodes-count" id="episodes-count"></div>

        <div class="episodes-grid" id="episodes-container">
          <div class="loading">Loading episodes...</div>
        </div>
      </div>

      <footer
        style="
          text-align: center;
          color: white;
          margin-top: 48px;
          opacity: 0.8;
          font-size: 14px;
        "
      >
        <p>Data Over Dogma DB Tools</p>
      </footer>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
