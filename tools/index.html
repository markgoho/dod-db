<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Episodes - Data Over Dogma Tools</title>
    <link rel="stylesheet" href="/shared/styles.css" />
    <style>
      /* Page-specific styles */
      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
        flex-wrap: wrap;
      }

      .header-main {
        flex: 1;
        min-width: 300px;
      }

      .header-main h1 {
        font-size: 36px;
        margin-bottom: 8px;
      }

      .quick-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .quick-tool {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: var(--color-gray-100);
        border-radius: var(--radius-full);
        font-size: 13px;
        font-weight: 600;
        color: var(--color-gray-700);
        text-decoration: none;
        transition: all 0.2s;
      }

      .quick-tool:hover {
        background: var(--color-gradient);
        color: white;
        text-decoration: none;
        transform: translateY(-1px);
      }

      .controls {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .search-input {
        flex: 1;
        min-width: 250px;
        padding: 12px 16px;
        border: 1px solid var(--color-gray-200);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: inherit;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .sort-select {
        padding: 12px 16px;
        border: 1px solid var(--color-gray-200);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: inherit;
        background: white;
        cursor: pointer;
        min-width: 180px;
      }

      .episodes-count {
        font-size: 14px;
        color: var(--color-gray-500);
        margin-bottom: 16px;
      }

      .episode-card {
        text-decoration: none;
      }

      .episode-card:hover .episode-title {
        color: var(--color-primary);
      }

      .segment-indicators {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }

      .segment-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <div class="header-main">
            <h1>DoD Episodes</h1>
            <p class="subtitle">Browse and manage all Data Over Dogma episodes</p>
          </div>
          <div class="quick-tools">
            <a href="/validate-timestamps" class="quick-tool">
              <span>Timestamp Validator</span>
            </a>
            <a href="/review-corrections" class="quick-tool">
              <span>Corrections</span>
            </a>
            <a href="/tag-vocabulary" class="quick-tool">
              <span>Tag Vocabulary</span>
            </a>
            <a href="/segment-verification" class="quick-tool">
              <span>Segments</span>
            </a>
          </div>
        </div>
        <div class="stats" id="stats">
          <div class="stat">
            <span class="stat-value" id="total-episodes">-</span>
            <div class="stat-label">Episodes</div>
          </div>
          <div class="stat">
            <span class="stat-value" id="total-tags">-</span>
            <div class="stat-label">Total Tags</div>
          </div>
          <div class="stat">
            <span class="stat-value" id="total-segments">-</span>
            <div class="stat-label">Segments</div>
          </div>
        </div>
      </header>

      <div class="section">
        <div class="controls">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search episodes by title..."
          />
          <select id="sort-select" class="sort-select">
            <option value="episode-desc">Episode # (newest)</option>
            <option value="episode-asc">Episode # (oldest)</option>
            <option value="date-desc">Date (newest)</option>
            <option value="date-asc">Date (oldest)</option>
            <option value="tags-desc">Tag count (high)</option>
            <option value="tags-asc">Tag count (low)</option>
          </select>
        </div>

        <div class="episodes-count" id="episodes-count"></div>

        <div class="episodes-grid" id="episodes-container">
          <div class="loading">Loading episodes...</div>
        </div>
      </div>

      <footer style="text-align: center; color: white; margin-top: 48px; opacity: 0.8; font-size: 14px;">
        <p>Data Over Dogma DB Tools</p>
      </footer>
    </div>

    <script type="module" src="/shared/utilities.js"></script>
    <script type="module">
      import { DoDTools } from '/shared/utilities.js';

      let allEpisodes = [];

      async function init() {
        try {
          allEpisodes = await DoDTools.getAllEpisodes();
          updateStats();
          renderEpisodes();
        } catch (error) {
          console.error('Failed to load episodes:', error);
          document.getElementById('episodes-container').innerHTML =
            '<div class="empty-state"><div class="empty-state-icon">Error</div><div class="empty-state-text">Failed to load episodes</div></div>';
        }
      }

      function updateStats() {
        const totalTags = allEpisodes.reduce((sum, ep) => sum + (ep.tags?.length || 0), 0);
        const totalSegments = allEpisodes.reduce((sum, ep) => sum + (ep.segments?.length || 0), 0);

        document.getElementById('total-episodes').textContent = allEpisodes.length;
        document.getElementById('total-tags').textContent = totalTags;
        document.getElementById('total-segments').textContent = totalSegments;
      }

      function getFilteredAndSortedEpisodes() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const sortValue = document.getElementById('sort-select').value;

        let filtered = allEpisodes;

        // Filter by search term
        if (searchTerm) {
          filtered = filtered.filter(ep =>
            ep.title.toLowerCase().includes(searchTerm) ||
            ep.tags?.some(t => t.tag.toLowerCase().includes(searchTerm))
          );
        }

        // Sort
        const sorted = [...filtered];
        switch (sortValue) {
          case 'episode-desc':
            sorted.sort((a, b) => (b.episodeNumber || 0) - (a.episodeNumber || 0));
            break;
          case 'episode-asc':
            sorted.sort((a, b) => (a.episodeNumber || 0) - (b.episodeNumber || 0));
            break;
          case 'date-desc':
            sorted.sort((a, b) => new Date(b.publishedAt).getTime() - new Date(a.publishedAt).getTime());
            break;
          case 'date-asc':
            sorted.sort((a, b) => new Date(a.publishedAt).getTime() - new Date(b.publishedAt).getTime());
            break;
          case 'tags-desc':
            sorted.sort((a, b) => (b.tags?.length || 0) - (a.tags?.length || 0));
            break;
          case 'tags-asc':
            sorted.sort((a, b) => (a.tags?.length || 0) - (b.tags?.length || 0));
            break;
        }

        return sorted;
      }

      function renderEpisodes() {
        const episodes = getFilteredAndSortedEpisodes();
        const container = document.getElementById('episodes-container');
        const countEl = document.getElementById('episodes-count');

        countEl.textContent = `Showing ${episodes.length} of ${allEpisodes.length} episodes`;

        if (episodes.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">No Episodes</div>
              <div class="empty-state-text">No episodes match your search</div>
            </div>
          `;
          return;
        }

        container.innerHTML = episodes.map(episode => {
          const tagCount = episode.tags?.length || 0;
          const segmentCount = episode.segments?.length || 0;
          const tagsPreview = episode.tags?.slice(0, 4) || [];
          const moreCount = tagCount > 4 ? tagCount - 4 : 0;

          // Create segment type indicators
          const segmentTypes = [...new Set(episode.segments?.map(s => s.type) || [])];

          return `
            <a href="/episode/${episode.videoId}" class="episode-card">
              <div class="episode-header">
                <div class="episode-number">Episode ${episode.episodeNumber || '?'}</div>
                <div class="episode-title">${DoDTools.escapeHtml(episode.title)}</div>
              </div>
              <div class="episode-meta">
                <span>${DoDTools.formatDate(episode.publishedAt)}</span>
                <span>${tagCount} tags</span>
                <span>${segmentCount} segments</span>
              </div>
              ${tagsPreview.length > 0 ? `
                <div class="episode-tags">
                  ${tagsPreview.map(tag => `
                    <span class="tag-badge">${DoDTools.escapeHtml(tag.tag)} (${tag.mentions})</span>
                  `).join('')}
                  ${moreCount > 0 ? `<span class="tag-badge">+${moreCount} more</span>` : ''}
                </div>
              ` : ''}
            </a>
          `;
        }).join('');
      }

      // Event listeners
      document.getElementById('search-input').addEventListener('input', DoDTools.debounce(renderEpisodes, 200));
      document.getElementById('sort-select').addEventListener('change', renderEpisodes);

      // Initialize
      init();
    </script>
  </body>
</html>
