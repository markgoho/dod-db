<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segment Verification - Data Over Dogma</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a2e;
        min-height: 100vh;
        color: #e0e0e0;
      }
      .container {
        max-width: 100%;
        margin: 0 auto;
        padding: 20px;
      }
      header {
        background: #16213e;
        padding: 24px 32px;
        border-radius: 12px;
        margin-bottom: 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      h1 {
        font-size: 24px;
        color: #e94560;
      }
      .stats {
        display: flex;
        gap: 32px;
      }
      .stat {
        text-align: center;
      }
      .stat-value {
        font-size: 28px;
        font-weight: 700;
        color: #e94560;
      }
      .stat-label {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }
      .main-layout {
        display: grid;
        grid-template-columns: 280px 1fr 1fr;
        gap: 24px;
        height: calc(100vh - 180px);
      }
      .sidebar {
        background: #16213e;
        border-radius: 12px;
        padding: 20px;
        overflow-y: auto;
      }
      .sidebar h2 {
        font-size: 16px;
        color: #e94560;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #333;
      }
      .episode-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .episode-item {
        padding: 12px;
        background: #1a1a2e;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid transparent;
      }
      .episode-item:hover {
        background: #0f3460;
      }
      .episode-item.active {
        border-color: #e94560;
        background: #0f3460;
      }
      .episode-item .ep-number {
        font-size: 12px;
        font-weight: 700;
        color: #e94560;
      }
      .episode-item .ep-title {
        font-size: 13px;
        color: #ccc;
        margin-top: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .episode-item .ep-segments {
        font-size: 11px;
        color: #888;
        margin-top: 6px;
      }
      .episode-item .segment-dots {
        display: flex;
        gap: 4px;
        margin-top: 6px;
      }
      .segment-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .content {
        background: #16213e;
        border-radius: 12px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
      }
      .transcript-panel {
        background: #16213e;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .transcript-panel h3 {
        font-size: 16px;
        color: #e94560;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
      }
      #transcript-lines {
        flex: 1;
        overflow-y: auto;
        scroll-behavior: smooth;
      }
      .no-selection {
        text-align: center;
        padding: 60px;
        color: #666;
      }
      .episode-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 16px;
        border-bottom: 1px solid #333;
      }
      .episode-header h2 {
        font-size: 18px;
        color: #fff;
      }
      .timeline-container {
        background: #1a1a2e;
        border-radius: 8px;
        padding: 16px;
      }
      .timeline-label {
        font-size: 12px;
        color: #888;
        margin-bottom: 8px;
      }
      .timeline {
        height: 40px;
        background: #0f3460;
        border-radius: 4px;
        position: relative;
        overflow: hidden;
      }
      .timeline-segment {
        position: absolute;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        transition: filter 0.2s;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 0 4px;
      }
      .timeline-segment:hover {
        filter: brightness(1.2);
      }
      .timeline-segment.active {
        outline: 2px solid #fff;
        outline-offset: -2px;
      }
      .audio-container {
        background: #1a1a2e;
        border-radius: 8px;
        padding: 16px;
      }
      .audio-container audio {
        width: 100%;
      }
      .audio-time {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #888;
        margin-top: 8px;
      }
      .segments-editor {
        background: #1a1a2e;
        border-radius: 8px;
        padding: 16px;
      }
      .segments-editor h3 {
        font-size: 14px;
        color: #e94560;
        margin-bottom: 12px;
      }
      .segment-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .segment-row {
        display: grid;
        grid-template-columns: 140px 100px 100px auto 50px 30px;
        gap: 8px;
        align-items: center;
        padding: 8px;
        background: #16213e;
        border-radius: 6px;
      }
      .segment-row.active {
        outline: 2px solid #e94560;
      }
      .segment-row select,
      .segment-row input {
        background: #1a1a2e;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 6px 8px;
        color: #e0e0e0;
        font-size: 12px;
      }
      .segment-row select:focus,
      .segment-row input:focus {
        outline: none;
        border-color: #e94560;
      }
      .segment-color {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        margin-right: 4px;
        display: inline-block;
        vertical-align: middle;
      }
      .btn {
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #e94560;
        color: white;
      }
      .btn-primary:hover {
        background: #d63851;
      }
      .btn-secondary {
        background: #333;
        color: #ccc;
      }
      .btn-secondary:hover {
        background: #444;
      }
      .btn-small {
        padding: 4px 8px;
        font-size: 11px;
      }
      .btn-danger {
        background: #dc2626;
        color: white;
      }
      .btn-danger:hover {
        background: #b91c1c;
      }
      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        padding-top: 16px;
        border-top: 1px solid #333;
      }
            .transcript-line {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 4px;
        margin-bottom: 2px;
        cursor: pointer;
      }
      .transcript-line:hover {
        background: #0f3460;
      }
      .transcript-line.active {
        background: #0f3460;
      }
      .transcript-line .timestamp {
        color: #e94560;
        font-family: monospace;
        margin-right: 8px;
      }
      .transcript-line .speaker {
        color: #888;
        margin-right: 8px;
      }
      .status-badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 600;
      }
      .status-badge.auto {
        background: #fbbf24;
        color: #000;
      }
      .status-badge.verified {
        background: #22c55e;
        color: #fff;
      }
      .filter-bar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .filter-bar select {
        background: #1a1a2e;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 6px 10px;
        color: #e0e0e0;
        font-size: 12px;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        z-index: 1000;
        animation: slideIn 0.3s ease;
      }
      .toast.success {
        background: #22c55e;
        color: white;
      }
      .toast.error {
        background: #dc2626;
        color: white;
      }
      @keyframes slideIn {
        from {
          transform: translateX(100px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Segment Verification</h1>
        <div class="stats">
          <div class="stat">
            <span class="stat-value" id="total-episodes">-</span>
            <div class="stat-label">Episodes</div>
          </div>
          <div class="stat">
            <span class="stat-value" id="total-segments">-</span>
            <div class="stat-label">Segments</div>
          </div>
          <div class="stat">
            <span class="stat-value" id="verified-count">-</span>
            <div class="stat-label">Verified</div>
          </div>
        </div>
      </header>

      <div class="main-layout">
        <div class="sidebar">
          <h2>Episodes</h2>
          <div class="filter-bar">
            <select id="status-filter">
              <option value="all">All Status</option>
              <option value="needs-review">Needs Review</option>
              <option value="verified">Verified</option>
            </select>
          </div>
          <div class="episode-list" id="episode-list">
            <!-- Episodes loaded here -->
          </div>
        </div>

        <div class="content" id="content">
          <div class="no-selection">
            <p>Select an episode to view and edit segments</p>
          </div>
        </div>

        <div class="transcript-panel" id="transcript-panel">
          <h3>Transcript</h3>
          <div class="transcript-lines-wrapper" id="transcript-lines">
            <p style="color: #666; text-align: center; padding: 40px;">Select an episode to view transcript</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      // State
      let episodes = [];
      let metadata = { labels: {}, colors: {}, types: [] };
      let selectedEpisode = null;
      let selectedSegmentIndex = null;
      let audioElement = null;
      let transcriptLines = []; // Parsed transcript lines with timestamps

      // Load data on page load
      async function init() {
        await Promise.all([loadMetadata(), loadEpisodes(), loadStats()]);
        renderEpisodeList();
      }

      async function loadMetadata() {
        const res = await fetch("/api/segment-metadata");
        metadata = await res.json();
      }

      async function loadEpisodes() {
        const res = await fetch("/api/episodes");
        episodes = await res.json();
      }

      async function loadStats() {
        const res = await fetch("/api/stats");
        const stats = await res.json();
        document.getElementById("total-episodes").textContent =
          stats.totalEpisodes;
        document.getElementById("total-segments").textContent =
          stats.autoDetected + stats.verified;
        document.getElementById("verified-count").textContent = stats.verified;
      }

      function renderEpisodeList() {
        const filter = document.getElementById("status-filter").value;
        const list = document.getElementById("episode-list");

        const filtered = episodes.filter((ep) => {
          if (filter === "all") return true;
          const allVerified =
            ep.segments?.every((s) => s.confidence === "verified") ?? false;
          if (filter === "verified") return allVerified;
          if (filter === "needs-review") return !allVerified;
          return true;
        });

        list.innerHTML = filtered
          .map((ep) => {
            const segmentCount = ep.segments?.length || 0;
            const verifiedCount =
              ep.segments?.filter((s) => s.confidence === "verified").length ||
              0;
            const allVerified = segmentCount > 0 && verifiedCount === segmentCount;
            const isActive = selectedEpisode?.videoId === ep.videoId;

            return `
            <div class="episode-item ${isActive ? "active" : ""}" onclick="selectEpisode('${ep.videoId}')">
              <div class="ep-number">Episode ${ep.episodeNumber || "?"}</div>
              <div class="ep-title">${escapeHtml(ep.title)}</div>
              <div class="ep-segments">
                ${segmentCount} segments
                <span class="status-badge ${allVerified ? "verified" : "auto"}">
                  ${allVerified ? "Verified" : "Auto"}
                </span>
              </div>
              <div class="segment-dots">
                ${(ep.segments || [])
                  .map(
                    (s) =>
                      `<div class="segment-dot" style="background: ${metadata.colors[s.type] || "#666"}"></div>`
                  )
                  .join("")}
              </div>
            </div>
          `;
          })
          .join("");
      }

      async function selectEpisode(videoId) {
        selectedEpisode = episodes.find((ep) => ep.videoId === videoId);
        selectedSegmentIndex = null;

        if (!selectedEpisode) return;

        renderEpisodeList();
        renderContent();
      }

      function renderContent() {
        const content = document.getElementById("content");

        if (!selectedEpisode) {
          content.innerHTML = `
            <div class="no-selection">
              <p>Select an episode to view and edit segments</p>
            </div>
          `;
          return;
        }

        const segments = selectedEpisode.segments || [];
        const totalDuration = getTotalDuration(segments);

        content.innerHTML = `
          <div class="episode-header">
            <h2>Episode ${selectedEpisode.episodeNumber}: ${escapeHtml(selectedEpisode.title)}</h2>
          </div>

          <div class="timeline-container">
            <div class="timeline-label">Segment Timeline</div>
            <div class="timeline" id="timeline">
              ${segments
                .map((seg, i) => {
                  const start = timestampToSeconds(seg.startTimestamp);
                  const end = seg.endTimestamp
                    ? timestampToSeconds(seg.endTimestamp)
                    : totalDuration;
                  const left = (start / totalDuration) * 100;
                  const width = ((end - start) / totalDuration) * 100;
                  const isActive = i === selectedSegmentIndex;
                  return `
                  <div class="timeline-segment ${isActive ? "active" : ""}"
                       style="left: ${left}%; width: ${width}%; background: ${metadata.colors[seg.type] || "#666"}"
                       onclick="selectSegment(${i})"
                       title="${metadata.labels[seg.type] || seg.type}">
                    ${metadata.labels[seg.type] || seg.type}
                  </div>
                `;
                })
                .join("")}
            </div>
          </div>

          <div class="audio-container">
            <audio id="audio" controls>
              <source src="/api/audio/${selectedEpisode.videoId}" type="audio/webm">
              Your browser does not support the audio element.
            </audio>
            <div class="audio-time">
              <span id="current-time">00:00:00</span>
              <span id="total-time">--:--:--</span>
            </div>
          </div>

          <div class="segments-editor">
            <h3>Segments</h3>
            <div class="segment-list" id="segment-list">
              ${segments
                .map(
                  (seg, i) => `
                <div class="segment-row ${i === selectedSegmentIndex ? "active" : ""}" data-index="${i}">
                  <select onchange="updateSegmentType(${i}, this.value)">
                    ${metadata.types
                      .map(
                        (type) => `
                      <option value="${type}" ${seg.type === type ? "selected" : ""}>
                        ${metadata.labels[type]}
                      </option>
                    `
                      )
                      .join("")}
                  </select>
                  <input type="text" value="${formatTimestamp(seg.startTimestamp)}"
                         onchange="updateSegmentStart(${i}, this.value)"
                         placeholder="Start">
                  <input type="text" value="${seg.endTimestamp ? formatTimestamp(seg.endTimestamp) : ""}"
                         onchange="updateSegmentEnd(${i}, this.value)"
                         placeholder="End">
                  <div>
                    <span class="status-badge ${seg.confidence}">${seg.confidence}</span>
                  </div>
                  <button class="btn btn-small btn-secondary" onclick="playSegment(${i})">Play</button>
                  <button class="btn btn-small btn-danger" onclick="deleteSegment(${i})">X</button>
                </div>
              `
                )
                .join("")}
            </div>
            <div class="actions">
              <button class="btn btn-secondary" onclick="addSegment()">+ Add Segment</button>
              <button class="btn btn-primary" onclick="markAllVerified()">Mark All Verified</button>
              <button class="btn btn-primary" onclick="saveSegments()">Save Changes</button>
            </div>
          </div>
        `;

        // Setup audio element
        audioElement = document.getElementById("audio");
        audioElement.addEventListener("timeupdate", updateTimeDisplay);
        audioElement.addEventListener("loadedmetadata", () => {
          document.getElementById("total-time").textContent = formatSeconds(
            audioElement.duration
          );
        });

        // Load transcript
        loadTranscript();
      }

      async function loadTranscript() {
        const res = await fetch(`/api/transcript/${selectedEpisode.videoId}`);
        const data = await res.json();

        if (data.error) {
          document.getElementById("transcript-lines").innerHTML =
            `<p style="color: #888">${data.error}</p>`;
          transcriptLines = [];
          return;
        }

        const lines = data.transcript.split("\n").filter((l) => l.trim());
        const linePattern =
          /^\s*\[(\d{2}:\d{2}:\d{2}(?:\.\d{3})?)\]\s*([^:]+):\s*(.*)$/;

        // Parse and store transcript lines with timestamps
        transcriptLines = [];
        lines.forEach((line, idx) => {
          const match = linePattern.exec(line);
          if (match) {
            transcriptLines.push({
              index: idx,
              timestamp: match[1],
              seconds: timestampToSeconds(`[${match[1]}]`),
              speaker: match[2],
              text: match[3],
            });
          }
        });

        // Render transcript (show all lines - virtualization could be added later if needed)
        document.getElementById("transcript-lines").innerHTML = transcriptLines
          .map((line, i) => `
            <div class="transcript-line" id="tline-${i}" onclick="jumpToTime('${line.timestamp}')">
              <span class="timestamp">[${line.timestamp}]</span>
              <span class="speaker">${escapeHtml(line.speaker)}:</span>
              <span class="text">${escapeHtml(line.text)}</span>
            </div>
          `)
          .join("");
      }

      function selectSegment(index) {
        selectedSegmentIndex = index;
        // Jump audio to segment start and play
        const seg = selectedEpisode?.segments?.[index];
        if (seg && audioElement) {
          const seconds = timestampToSeconds(seg.startTimestamp);
          audioElement.currentTime = seconds;
          audioElement.play();
        }
        // Update visual selection without re-rendering (preserves audio state)
        updateSegmentSelection();
      }

      function updateSegmentSelection() {
        // Update timeline segment highlighting
        document.querySelectorAll('.timeline-segment').forEach((el, i) => {
          el.classList.toggle('active', i === selectedSegmentIndex);
        });
        // Update segment row highlighting
        document.querySelectorAll('.segment-row').forEach((el, i) => {
          el.classList.toggle('active', i === selectedSegmentIndex);
        });
      }

      function jumpToSegment(index) {
        const seg = selectedEpisode.segments[index];
        if (!seg || !audioElement) return;

        const seconds = timestampToSeconds(seg.startTimestamp);
        audioElement.currentTime = seconds;
        audioElement.play();
        selectedSegmentIndex = index;
        // Don't call renderContent() - it recreates the audio element and resets position
        updateSegmentSelection();
      }

      function playSegment(index) {
        // Get audio element directly from DOM (more reliable)
        const audio = document.getElementById('audio');
        const seg = selectedEpisode?.segments?.[index];
        if (!seg || !audio) {
          console.error('playSegment failed:', { seg, audio, index });
          return;
        }

        const seconds = timestampToSeconds(seg.startTimestamp);
        console.log('Playing segment', index, 'at', seconds, 'seconds');
        audio.currentTime = seconds;
        audio.play().catch(e => console.error('Play failed:', e));
        selectedSegmentIndex = index;
        updateSegmentSelection();
      }

      function deleteSegment(index) {
        if (!selectedEpisode?.segments) return;
        if (!confirm('Delete this segment?')) return;

        const segments = selectedEpisode.segments;
        const deleted = segments[index];
        const prev = segments[index - 1];
        const next = segments[index + 1];

        // Extend previous segment to fill the gap
        if (prev) {
          // Previous segment extends to deleted segment's end (or next segment's start)
          prev.endTimestamp = deleted.endTimestamp || (next ? next.startTimestamp : null);
          prev.confidence = 'auto'; // Mark as needing review
        } else if (next) {
          // No previous segment - extend next segment backward
          next.startTimestamp = deleted.startTimestamp;
          next.confidence = 'auto';
        }

        segments.splice(index, 1);
        selectedSegmentIndex = null;
        renderContent();
      }

      function jumpToTime(timestamp) {
        if (!audioElement) return;
        const seconds = timestampToSeconds(`[${timestamp}]`);
        console.log('Jumping to timestamp:', timestamp, 'seconds:', seconds);
        audioElement.currentTime = seconds;
        audioElement.play();
      }

      function updateTimeDisplay() {
        if (!audioElement) return;
        document.getElementById("current-time").textContent = formatSeconds(
          audioElement.currentTime
        );

        // Auto-highlight and scroll transcript
        if (transcriptLines.length === 0) return;
        const currentTime = audioElement.currentTime;

        // Find the most recent line whose timestamp has passed
        for (let i = transcriptLines.length - 1; i >= 0; i--) {
          if (transcriptLines[i].seconds <= currentTime) {
            const lineId = `tline-${i}`;
            const currentActive = document.querySelector('.transcript-line.active');

            // Only update if different line
            if (!currentActive || currentActive.id !== lineId) {
              document.querySelectorAll('.transcript-line').forEach(el => {
                el.classList.remove('active');
              });
              const newActive = document.getElementById(lineId);
              if (newActive) {
                newActive.classList.add('active');
                // Scroll within the transcript panel
                const container = document.getElementById('transcript-lines');
                if (container) {
                  const containerRect = container.getBoundingClientRect();
                  const lineRect = newActive.getBoundingClientRect();
                  const scrollTop = container.scrollTop + lineRect.top - containerRect.top - containerRect.height / 2;
                  container.scrollTo({ top: scrollTop, behavior: 'smooth' });
                }
              }
            }
            break;
          }
        }
      }

      function updateSegmentType(index, type) {
        if (!selectedEpisode?.segments) return;
        selectedEpisode.segments[index].type = type;
        selectedEpisode.segments[index].confidence = "auto";
        // Re-render timeline to show new color
        updateTimeline();
      }

      function updateTimeline() {
        const segments = selectedEpisode?.segments || [];
        const totalDuration = getTotalDuration(segments);
        const timeline = document.getElementById('timeline');
        if (!timeline) return;

        timeline.innerHTML = segments
          .map((seg, i) => {
            const start = timestampToSeconds(seg.startTimestamp);
            const end = seg.endTimestamp
              ? timestampToSeconds(seg.endTimestamp)
              : totalDuration;
            const left = (start / totalDuration) * 100;
            const width = ((end - start) / totalDuration) * 100;
            const isActive = i === selectedSegmentIndex;
            return `
              <div class="timeline-segment ${isActive ? "active" : ""}"
                   style="left: ${left}%; width: ${width}%; background: ${metadata.colors[seg.type] || "#666"}"
                   onclick="selectSegment(${i})"
                   title="${metadata.labels[seg.type] || seg.type}">
                ${metadata.labels[seg.type] || seg.type}
              </div>
            `;
          })
          .join("");
      }

      function updateSegmentStart(index, value) {
        if (!selectedEpisode?.segments) return;
        const ts = parseTimestamp(value);
        if (ts) {
          selectedEpisode.segments[index].startTimestamp = ts;
          selectedEpisode.segments[index].confidence = "auto";
          updateTimeline();
        }
      }

      function updateSegmentEnd(index, value) {
        if (!selectedEpisode?.segments) return;
        const ts = value ? parseTimestamp(value) : null;
        selectedEpisode.segments[index].endTimestamp = ts;
        selectedEpisode.segments[index].confidence = "auto";
        updateTimeline();
      }

      function addSegment() {
        if (!selectedEpisode) return;
        if (!selectedEpisode.segments) {
          selectedEpisode.segments = [];
        }

        const currentTime = audioElement?.currentTime || 0;
        const newStartTimestamp = formatSecondsToTimestamp(currentTime);

        // Find where to insert based on timestamp order
        const segments = selectedEpisode.segments;
        let insertIndex = segments.length; // Default: end of list

        for (let i = 0; i < segments.length; i++) {
          const segStart = timestampToSeconds(segments[i].startTimestamp);
          if (currentTime < segStart) {
            insertIndex = i;
            break;
          }
        }

        // Update previous segment's end timestamp to match new segment's start
        if (insertIndex > 0) {
          segments[insertIndex - 1].endTimestamp = newStartTimestamp;
          segments[insertIndex - 1].confidence = "auto";
        }

        // Insert new segment at the correct position
        const newSegment = {
          type: "main-content",
          startTimestamp: newStartTimestamp,
          endTimestamp: segments[insertIndex]?.startTimestamp || null,
          confidence: "auto",
          detectionMethod: "manual",
        };

        segments.splice(insertIndex, 0, newSegment);
        selectedSegmentIndex = insertIndex;

        renderContent();
      }

      async function markAllVerified() {
        if (!selectedEpisode?.segments) return;

        // Find segments that might need patterns learned (manual or non-intro/outro/main-content)
        const learnableSegments = selectedEpisode.segments.filter(seg =>
          seg.detectionMethod === 'manual' ||
          (seg.confidence === 'auto' && !['intro', 'outro', 'main-content'].includes(seg.type))
        );

        // Offer to learn patterns from segments
        if (learnableSegments.length > 0 && transcriptLines.length > 0) {
          const learn = confirm(
            `Found ${learnableSegments.length} segment(s) that could teach new detection patterns.\n\n` +
            `Would you like to review and add patterns for future detection?`
          );

          if (learn) {
            for (const seg of learnableSegments) {
              await learnPatternFromSegment(seg);
            }
          }
        }

        // Mark all as verified
        for (const seg of selectedEpisode.segments) {
          seg.confidence = "verified";
        }
        renderContent();
      }

      async function learnPatternFromSegment(seg) {
        // Find the transcript line at or near this segment's start time
        const segStart = timestampToSeconds(seg.startTimestamp);
        let closestLine = null;
        let closestDiff = Infinity;

        for (const line of transcriptLines) {
          const diff = Math.abs(line.seconds - segStart);
          if (diff < closestDiff) {
            closestDiff = diff;
            closestLine = line;
          }
          if (line.seconds > segStart + 10) break;
        }

        if (!closestLine) return;

        const text = closestLine.text;
        const segmentLabel = metadata.labels[seg.type] || seg.type;

        // Let user edit the pattern before saving
        const pattern = prompt(
          `Learn pattern for "${segmentLabel}"?\n\n` +
          `Transcript at ${closestLine.timestamp}:\n"${text}"\n\n` +
          `Edit to create a reusable pattern (or Cancel to skip):`,
          text.slice(0, 60)
        );

        if (!pattern) return; // User cancelled

        try {
          const res = await fetch('/api/patterns/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              segmentType: seg.type,
              pattern: pattern.trim(),
            }),
          });

          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || 'Failed to add pattern');
          }

          showToast(`Pattern learned for ${segmentLabel}!`, 'success');
        } catch (error) {
          showToast(error.message, 'error');
        }
      }

      async function saveSegments() {
        if (!selectedEpisode) return;

        try {
          const res = await fetch(`/api/segments/${selectedEpisode.videoId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ segments: selectedEpisode.segments }),
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || "Failed to save");
          }

          showToast("Segments saved successfully!", "success");
          await loadStats();
          renderEpisodeList();
        } catch (error) {
          showToast(error.message, "error");
        }
      }

      // Utility functions
      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function timestampToSeconds(timestamp) {
        const clean = timestamp.replace(/[[\]]/g, "");
        const parts = clean.split(":");
        const hours = parseInt(parts[0], 10);
        const minutes = parseInt(parts[1], 10);
        const seconds = parseFloat(parts[2]);
        return hours * 3600 + minutes * 60 + seconds;
      }

      function formatTimestamp(timestamp) {
        return timestamp
          .replace(/[[\]]/g, "")
          .replace(/\.\d{3}$/, "");
      }

      function parseTimestamp(str) {
        const match = /^(\d{1,2}):(\d{2}):(\d{2})$/.exec(str.trim());
        if (!match) return null;
        return `[${match[1].padStart(2, "0")}:${match[2]}:${match[3]}.000]`;
      }

      function formatSeconds(sec) {
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = Math.floor(sec % 60);
        return `${h.toString().padStart(2, "0")}:${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
      }

      function formatSecondsToTimestamp(sec) {
        return `[${formatSeconds(sec)}.000]`;
      }

      function getTotalDuration(segments) {
        if (!segments.length) return 3600; // Default 1 hour
        let max = 0;
        for (const seg of segments) {
          const end = seg.endTimestamp
            ? timestampToSeconds(seg.endTimestamp)
            : timestampToSeconds(seg.startTimestamp) + 300;
          if (end > max) max = end;
        }
        return max;
      }

      function showToast(message, type) {
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      // Event listeners
      document
        .getElementById("status-filter")
        .addEventListener("change", renderEpisodeList);

      // Initialize
      init();
    </script>
  </body>
</html>
